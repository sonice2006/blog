<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>실시간 방명록</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #333;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
      font-size: 28px;
    }

    .card {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #777;
    }

    #authorInput {
      width: 130px;
    }

    #messageInput {
      flex: 1;
      min-width: 0;
    }

    button {
      height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: #333;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #111;
    }

    button:disabled {
      cursor: not-allowed;
      background: #aaa;
    }

    .status {
      margin: 12px 0 0;
      color: #777;
      font-size: 13px;
      text-align: center;
    }

    .status.error {
      color: #d32f2f;
    }

    .guestbook-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .guestbook-item {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .guestbook-item:last-child {
      border-bottom: 0;
    }

    .author {
      margin-right: 8px;
      font-weight: bold;
    }

    .message {
      color: #555;
    }

    .date {
      display: block;
      margin-top: 6px;
      color: #999;
      font-size: 12px;
    }

    .empty {
      padding: 25px 0;
      color: #999;
      text-align: center;
    }

    @media (max-width: 600px) {
      body {
        padding: 20px 12px;
      }

      .input-group {
        flex-direction: column;
      }

      #authorInput,
      #messageInput,
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>실시간 방명록</h1>

    <section class="card">
      <form id="guestbookForm" class="input-group">
        <input
          id="authorInput"
          type="text"
          maxlength="20"
          placeholder="아이디"
          required
        >

        <input
          id="messageInput"
          type="text"
          maxlength="200"
          placeholder="메시지를 입력하세요"
          required
        >

        <button id="submitButton" type="submit">
          등록
        </button>
      </form>

      <p id="status" class="status">Firebase 연결 중...</p>
    </section>

    <section class="card">
      <ul id="guestbookList" class="guestbook-list">
        <li class="empty">방명록을 불러오는 중입니다.</li>
      </ul>
    </section>
  </main>

  <script type="module">
    // Firebase v10+ CDN 모듈
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


    // Firebase 콘솔의 웹 앱 설정값을 입력하세요.
const firebaseConfig = {
  apiKey: "AIzaSyDSQntjiC7SP9FhkRwEwnpujxHvJP9HZho",
  authDomain: "sonice2006-2d7a0.firebaseapp.com",
  projectId: "sonice2006-2d7a0",
  storageBucket: "sonice2006-2d7a0.firebasestorage.app",
  messagingSenderId: "148091192968",
  appId: "1:148091192968:web:eb3146afd9d99fdaf1813d",
  measurementId: "G-650PE31W9K"
};


    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);


    // HTML 요소
    const guestbookForm = document.getElementById("guestbookForm");
    const authorInput = document.getElementById("authorInput");
    const messageInput = document.getElementById("messageInput");
    const submitButton = document.getElementById("submitButton");
    const guestbookList = document.getElementById("guestbookList");
    const status = document.getElementById("status");


    // 상태 메시지
    function showStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("error", isError);
    }


    // 날짜 표시
    function formatDate(timestamp) {
      if (!timestamp) {
        return "방금 전";
      }

      return timestamp.toDate().toLocaleString("ko-KR");
    }


    // 익명 로그인
    async function startAnonymousLogin() {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.error(error);
        showStatus(
          "Firebase 익명 로그인을 확인해 주세요: " + error.code,
          true
        );
      }
    }


    // 로그인 상태 확인
    onAuthStateChanged(auth, (user) => {
      if (user) {
        showStatus("방명록을 작성할 수 있습니다.");
        submitButton.disabled = false;
      } else {
        submitButton.disabled = true;
      }
    });


    // 방명록 등록
    guestbookForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const author = authorInput.value.trim();
      const message = messageInput.value.trim();

      if (!auth.currentUser) {
        showStatus("Firebase 인증 연결 중입니다.", true);
        return;
      }

      if (!author || !message) {
        showStatus("아이디와 메시지를 모두 입력해 주세요.", true);
        return;
      }

      try {
        submitButton.disabled = true;
        submitButton.textContent = "등록 중";

        await addDoc(collection(db, "guestbook"), {
          author: author,
          message: message,
          createdAt: serverTimestamp()
        });

        messageInput.value = "";
        messageInput.focus();

        showStatus("등록되었습니다.");
      } catch (error) {
        console.error(error);
        showStatus(
          "등록 오류: " + error.code,
          true
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "등록";
      }
    });


    // 실시간 방명록 조회
    const guestbookQuery = query(
      collection(db, "guestbook"),
      orderBy("createdAt", "desc")
    );

    onSnapshot(
      guestbookQuery,

      (snapshot) => {
        guestbookList.innerHTML = "";

        if (snapshot.empty) {
          guestbookList.innerHTML =
            '<li class="empty">등록된 방명록이 없습니다.</li>';
          return;
        }

        snapshot.forEach((documentSnapshot) => {
          const data = documentSnapshot.data();

          const item = document.createElement("li");
          item.className = "guestbook-item";

          const authorElement = document.createElement("span");
          authorElement.className = "author";
          authorElement.textContent = data.author || "익명";

          const messageElement = document.createElement("span");
          messageElement.className = "message";
          messageElement.textContent = data.message || "";

          const dateElement = document.createElement("time");
          dateElement.className = "date";
          dateElement.textContent = formatDate(data.createdAt);

          item.append(
            authorElement,
            messageElement,
            dateElement
          );

          guestbookList.appendChild(item);
        });
      },

      (error) => {
        console.error(error);

        guestbookList.innerHTML =
          '<li class="empty">방명록을 불러오지 못했습니다.</li>';

        showStatus(
          "Firestore 읽기 오류: " + error.code,
          true
        );
      }
    );


    // 앱 실행
    submitButton.disabled = true;
    startAnonymousLogin();
  </script>
</body>
</html>
